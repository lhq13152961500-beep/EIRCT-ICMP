<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>定位</title>
<style>body{margin:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666}#status{text-align:center;font-size:14px}</style>
</head>
<body>
<div id="status">正在定位...</div>
<script>
window._AMapSecurityConfig = { securityJsCode: '__AMAP_SECURITY_KEY__' };
var AMAP_KEY = '__AMAP_KEY__';
var sdkLoaded = false;
var sdkLoadTimeout = null;

function sendToApp(data) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(data));
    }
  } catch(e) {}
}

function tryBrowserGeo() {
  if (!navigator.geolocation) {
    sendToApp({type:'error', message:'Browser geolocation not available'});
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      sendToApp({type:'location', lat:pos.coords.latitude, lng:pos.coords.longitude, accuracy:Math.round(pos.coords.accuracy)||50, address:''});
      document.getElementById('status').textContent = pos.coords.latitude+','+pos.coords.longitude;
    },
    function(err) {
      sendToApp({type:'error', message:'Browser geo failed: '+err.message});
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:30000}
  );
  setInterval(function(){
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        sendToApp({type:'location', lat:pos.coords.latitude, lng:pos.coords.longitude, accuracy:Math.round(pos.coords.accuracy)||50, address:''});
      },
      function(){},
      {enableHighAccuracy:true, timeout:15000, maximumAge:30000}
    );
  }, 15000);
}

function doLocate() {
  sdkLoaded = true;
  if (sdkLoadTimeout) { clearTimeout(sdkLoadTimeout); sdkLoadTimeout = null; }

  if (!window.AMap) {
    document.getElementById('status').textContent = 'SDK加载失败，使用备用定位';
    sendToApp({type:'error', message:'AMap SDK not loaded, trying browser geo'});
    tryBrowserGeo();
    return;
  }
  var geo = new AMap.Geolocation({
    enableHighAccuracy: true,
    timeout: 20000,
    buttonPosition: 'hidden',
    showButton: false,
    showMarker: false,
    showCircle: false,
    panToLocation: false,
    zoomToAccuracy: false,
    GeoLocationFirst: true,
    useNative: true,
    noIpLocate: 3,
    extensions: 'base'
  });
  var gotFirstFix = false;
  function onResult(status, result) {
    if (status === 'complete' && result.position) {
      var lat = result.position.lat || (result.position.getLat && result.position.getLat());
      var lng = result.position.lng || (result.position.getLng && result.position.getLng());
      var acc = result.accuracy || 50;
      var addr = '';
      if (result.formattedAddress) addr = result.formattedAddress;
      else if (result.addressComponent) {
        var c = result.addressComponent;
        addr = (c.township || '') + (c.street || '') + (c.streetNumber || '');
        if (!addr) addr = (c.district || '') + (c.city || '');
      }
      gotFirstFix = true;
      document.getElementById('status').textContent = addr || (lat+','+lng);
      sendToApp({type:'location', lat:lat, lng:lng, accuracy:acc, address:addr});
    } else {
      var msg = (result && result.message) ? result.message : (status || 'unknown');
      document.getElementById('status').textContent = '高德定位失败: '+msg;
      sendToApp({type:'error', message:'Amap geo failed: '+msg});
      if (!gotFirstFix) {
        tryBrowserGeo();
      }
    }
  }
  geo.getCurrentPosition(onResult);
  setInterval(function(){
    geo.getCurrentPosition(onResult);
  }, 15000);
}

sdkLoadTimeout = setTimeout(function(){
  if (!sdkLoaded) {
    document.getElementById('status').textContent = 'SDK加载超时，使用备用定位';
    sendToApp({type:'error', message:'Amap SDK load timeout (8s), trying browser geo'});
    tryBrowserGeo();
  }
}, 8000);
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=__AMAP_KEY__&plugin=AMap.Geolocation" onload="doLocate()" onerror="sendToApp({type:'error',message:'SDK script load failed'});tryBrowserGeo();"></script>
</body>
</html>

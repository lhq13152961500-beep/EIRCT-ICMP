<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>定位</title>
<style>body{margin:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666}#status{text-align:center;font-size:14px;padding:12px}</style>
</head>
<body>
<div id="status">正在定位...</div>
<script>
var lastSentTime = 0;
var SEND_INTERVAL = 2000;
var watchId = null;
var gotFix = false;

function setStatus(msg) {
  var el = document.getElementById('status');
  if (el) el.textContent = msg;
}

function sendToApp(data) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(data));
    }
  } catch(e) {}
}

function sendLocation(lat, lng, accuracy) {
  var now = Date.now();
  if (now - lastSentTime < SEND_INTERVAL) return;
  lastSentTime = now;
  gotFix = true;
  sendToApp({ type: 'location', lat: lat, lng: lng, accuracy: accuracy || 50, address: '' });
  setStatus(lat.toFixed(5) + ',' + lng.toFixed(5) + ' ±' + Math.round(accuracy || 50) + 'm');
}

sendToApp({ type: 'debug', message: 'Page init, bridge=' + (!!window.ReactNativeWebView) + ' geo=' + (!!navigator.geolocation) });

if (!navigator.geolocation) {
  sendToApp({ type: 'error', message: 'navigator.geolocation not available on this device' });
  setStatus('设备不支持定位');
} else {
  setStatus('GPS定位中...');

  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      var acc = pos.coords.accuracy;
      sendToApp({ type: 'debug', message: 'GPS fix: acc=' + Math.round(acc) + 'm lat=' + pos.coords.latitude.toFixed(5) });
      sendLocation(pos.coords.latitude, pos.coords.longitude, acc);
    },
    function(err) {
      sendToApp({ type: 'error', message: 'GPS error code=' + err.code + ': ' + err.message });
      setStatus('定位失败: ' + err.message);

      if (err.code === 1) {
        sendToApp({ type: 'error', message: 'PERMISSION_DENIED - location permission not granted to WebView' });
      } else if (err.code === 2) {
        sendToApp({ type: 'error', message: 'POSITION_UNAVAILABLE - GPS hardware not available or disabled' });
      } else if (err.code === 3) {
        sendToApp({ type: 'error', message: 'TIMEOUT - GPS did not respond in time' });
      }
    },
    { enableHighAccuracy: true, timeout: 30000, maximumAge: 10000 }
  );

  setTimeout(function() {
    if (!gotFix) {
      sendToApp({ type: 'debug', message: 'Still waiting for GPS fix at 10s mark...' });
    }
  }, 10000);

  setTimeout(function() {
    if (!gotFix) {
      sendToApp({ type: 'debug', message: 'Still waiting for GPS fix at 20s mark...' });
      setStatus('GPS信号弱，继续等待...');
    }
  }, 20000);
}
</script>
</body>
</html>

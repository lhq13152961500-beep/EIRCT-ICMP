<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>吐峪沟地图</title>
<link rel="stylesheet" href="/assets/leaflet.min.css"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#e8dcc8}
  #map{width:100vw;height:100vh}
  .custom-marker{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none}
  .marker-bubble{background:white;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;gap:3px;transition:transform .15s}
  .marker-stem{width:2px;height:8px;margin:0 auto}
  .marker-dot{width:7px;height:7px;border-radius:50%;margin:-1px auto 0;border:2px solid white}
  .leaflet-control-attribution{font-size:8px!important;opacity:0.5!important}
</style>
</head>
<body>
<div id="map"></div>
<script src="/assets/leaflet.min.js"></script>
<script>
/* GCJ-02 → WGS-84 conversion (needed because POI coords are GCJ-02, OSM uses WGS-84) */
function gcj2wgs(lng, lat) {
  var a = 6378245.0, ee = 0.00669342162296594323;
  var dlat = transformLat(lng - 105.0, lat - 35.0);
  var dlng = transformLng(lng - 105.0, lat - 35.0);
  var radlat = lat / 180.0 * Math.PI;
  var magic = Math.sin(radlat);
  magic = 1 - ee * magic * magic;
  var sqrtmagic = Math.sqrt(magic);
  dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * Math.PI);
  dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * Math.PI);
  return [lng - dlng, lat - dlat];
}
function transformLat(x, y) {
  var ret = -100.0 + 2.0*x + 3.0*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
  ret += (20.0*Math.sin(6.0*x*Math.PI) + 20.0*Math.sin(2.0*x*Math.PI)) * 2.0/3.0;
  ret += (20.0*Math.sin(y*Math.PI) + 40.0*Math.sin(y/3.0*Math.PI)) * 2.0/3.0;
  ret += (160.0*Math.sin(y/12.0*Math.PI) + 320.0*Math.sin(y*Math.PI/30.0)) * 2.0/3.0;
  return ret;
}
function transformLng(x, y) {
  var ret = 300.0 + x + 2.0*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
  ret += (20.0*Math.sin(6.0*x*Math.PI) + 20.0*Math.sin(2.0*x*Math.PI)) * 2.0/3.0;
  ret += (20.0*Math.sin(x*Math.PI) + 40.0*Math.sin(x/3.0*Math.PI)) * 2.0/3.0;
  ret += (150.0*Math.sin(x/12.0*Math.PI) + 300.0*Math.sin(x/30.0*Math.PI)) * 2.0/3.0;
  return ret;
}

var POIS = [
  { id:"1",  pos:[89.5971,42.8603], name:"景区入口大门", emoji:"🚪", category:"建筑",  desc:"吐峪沟大峡谷景区正门，古朴石砌拱门，始建于清代" },
  { id:"2",  pos:[89.5998,42.8588], name:"麻扎村",       emoji:"🕌", category:"建筑",  desc:"千年维吾尔族古村落，保留完整的生土建筑群" },
  { id:"3",  pos:[89.6012,42.8572], name:"吐峪沟清真寺", emoji:"⛩️", category:"建筑",  desc:"历史悠久的伊斯兰建筑，精美木雕装饰令人叹为观止" },
  { id:"4",  pos:[89.6078,42.8641], name:"千年洞窟",     emoji:"⛰️", category:"建筑",  desc:"公元4世纪佛教石窟群，壁画保存完好" },
  { id:"5",  pos:[89.6045,42.8615], name:"古麻扎遗址",   emoji:"🏛️", category:"建筑",  desc:"伊斯兰圣祠遗址，是新疆最古老的麻扎之一" },
  { id:"6",  pos:[89.6035,42.8560], name:"非遗文化馆",   emoji:"🎨", category:"展览",  desc:"集中展示维吾尔族非物质文化遗产，含木卡姆、都它尔等项目" },
  { id:"7",  pos:[89.5985,42.8625], name:"民俗体验馆",   emoji:"🖼️", category:"展览",  desc:"原汁原味的维吾尔族传统手工艺展示与互动体验" },
  { id:"8",  pos:[89.6058,42.8625], name:"葡萄晾房",     emoji:"🍇", category:"特产",  desc:"传统土坯晾房，秋季满室葡萄干香气" },
  { id:"9",  pos:[89.5972,42.8638], name:"特产集市",     emoji:"🎁", category:"特产",  desc:"葡萄干、无花果、馕饼等吐峪沟特色农产品" },
  { id:"10", pos:[89.6020,42.8605], name:"烤馕馆",       emoji:"🫓", category:"美食",  desc:"现烤坑炉馕饼，外脆内软，是当地最具特色的主食" },
  { id:"11", pos:[89.6048,42.8583], name:"瓜果长廊",     emoji:"🍈", category:"美食",  desc:"种植哈密瓜、白杏等特色瓜果，可现场品尝" },
  { id:"12", pos:[89.6010,42.8640], name:"游客服务中心", emoji:"ℹ️",  category:"建筑",  desc:"提供景区导览、租赁、急救等综合服务" },
  { id:"13", pos:[89.6030,42.8600], name:"WC",           emoji:"🚻", category:"卫生间", desc:"公共卫生间" },
  { id:"14", pos:[89.6072,42.8558], name:"WC",           emoji:"🚻", category:"卫生间", desc:"公共卫生间" },
];

var COLORS = {
  "建筑":  { dot:"#E88A2E", text:"#B8681E" },
  "展览":  { dot:"#6B7FD4", text:"#4A5CB8" },
  "美食":  { dot:"#E8514A", text:"#C0392B" },
  "特产":  { dot:"#3DAA6F", text:"#2D8A55" },
  "卫生间":{ dot:"#8B8EC8", text:"#6B6EAA" },
};

var map = null;
var leafletMarkers = {};
var markerLayer = null; /* LayerGroup for batch add/remove */
var myLocMarker = null;
var activeMarkerId = null;
var currentFilter = "全部";
var selectedPoiIds = [];

function sendToApp(data) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(data));
    }
  } catch(e) {}
}

function buildMarkerHtml(poi, isActive, isSelected) {
  var c = COLORS[poi.category] || { dot:"#888", text:"#555" };
  var bgColor  = isActive ? c.dot : isSelected ? "#FFF4E6" : "white";
  var txtColor = isActive ? "white" : isSelected ? "#B8681E" : c.text;
  var border   = isActive ? "none" : isSelected ? "2px solid #E88A2E" : "2px solid " + c.dot;
  var shadow   = isActive ? "0 3px 10px rgba(0,0,0,0.35)" : isSelected ? "0 0 0 3px rgba(232,138,46,0.35), 0 2px 8px rgba(0,0,0,0.25)" : "0 2px 7px rgba(0,0,0,0.22)";
  var scale    = isActive ? "scale(1.12)" : isSelected ? "scale(1.08)" : "scale(1)";
  var dotColor = isSelected ? "#E88A2E" : c.dot;
  return (
    '<div class="custom-marker">' +
    '<div class="marker-bubble" style="background:' + bgColor + ';border:' + border + ';color:' + txtColor + ';box-shadow:' + shadow + ';transform:' + scale + '">' +
    poi.emoji + ' <span>' + poi.name + '</span></div>' +
    '<div class="marker-stem" style="background:' + dotColor + '"></div>' +
    '<div class="marker-dot" style="background:' + dotColor + '"></div>' +
    '</div>'
  );
}

function poiToWgs(poi) {
  var wgs = gcj2wgs(poi.pos[0], poi.pos[1]);
  return [wgs[1], wgs[0]]; /* leaflet uses [lat, lng] */
}

function createLeafletMarker(poi) {
  var wgsLatLng = poiToWgs(poi);
  var isActive = (poi.id === activeMarkerId);
  var isSelected = selectedPoiIds.indexOf(poi.id) !== -1;
  var icon = L.divIcon({
    html: buildMarkerHtml(poi, isActive, isSelected),
    className: '',
    iconSize: null,
    iconAnchor: [30, 54],
  });
  var m = L.marker(wgsLatLng, { icon: icon });
  m.on('click', function() {
    setActiveMarker(poi.id);
    sendToApp({ type:"poiClick", id:poi.id, name:poi.name, category:poi.category, desc:poi.desc, emoji:poi.emoji });
  });
  return m;
}

function setActiveMarker(id) {
  activeMarkerId = id;
  Object.keys(leafletMarkers).forEach(function(pid) {
    var m = leafletMarkers[pid];
    var poi = POIS.find(function(p){ return p.id === pid; });
    if (!poi) return;
    var isSelected = selectedPoiIds.indexOf(pid) !== -1;
    m.setIcon(L.divIcon({
      html: buildMarkerHtml(poi, poi.id === id, isSelected),
      className: '',
      iconSize: null,
      iconAnchor: [30, 54],
    }));
  });
}

window.highlightSelected = function(ids) {
  selectedPoiIds = ids || [];
  Object.keys(leafletMarkers).forEach(function(pid) {
    var m = leafletMarkers[pid];
    var poi = POIS.find(function(p){ return p.id === pid; });
    if (!poi) return;
    var isSelected = selectedPoiIds.indexOf(pid) !== -1;
    m.setIcon(L.divIcon({
      html: buildMarkerHtml(poi, poi.id === activeMarkerId, isSelected),
      className: '',
      iconSize: null,
      iconAnchor: [30, 54],
    }));
  });
};

window.zoomToSelectedPoi = function(id) {
  if (!map) return;
  var poi = POIS.find(function(p) { return p.id === id; });
  if (!poi) return;
  var wgs = gcj2wgs(poi.pos[0], poi.pos[1]);
  map.flyTo([wgs[1], wgs[0]], 17, { animate: true, duration: 0.6 });
};

function shouldShow(poi) {
  if (currentFilter === "全部") return true;
  return poi.category === currentFilter;
}

function renderMarkers() {
  /* Remove existing layer group in one shot */
  if (markerLayer) { markerLayer.clearLayers(); map.removeLayer(markerLayer); }
  markerLayer = L.layerGroup();
  leafletMarkers = {};
  POIS.forEach(function(poi) {
    if (!shouldShow(poi)) return;
    var m = createLeafletMarker(poi);
    markerLayer.addLayer(m);
    leafletMarkers[poi.id] = m;
  });
  /* Add entire group to map in one DOM operation */
  markerLayer.addTo(map);
}

window.filterPoi = function(category) {
  currentFilter = category;
  renderMarkers();
};

window.setMyLocation = function(lng, lat) {
  var wgs = gcj2wgs(lng, lat);
  var wgsLatLng = [wgs[1], wgs[0]];
  if (myLocMarker) myLocMarker.remove();
  var icon = L.icon({
    iconUrl: '/assets/loc-pin.png',
    iconSize: [48, 48],
    iconAnchor: [24, 48],
  });
  myLocMarker = L.marker(wgsLatLng, { icon: icon, zIndexOffset: 1000 });
  myLocMarker.addTo(map);
};

var _routePolyline = null;
var _routeStopMarkers = [];

window.drawRoute = function(poiIds, color) {
  if (_routePolyline) { _routePolyline.remove(); _routePolyline = null; }
  _routeStopMarkers.forEach(function(m) { m.remove(); });
  _routeStopMarkers = [];

  var points = [];
  var validPois = [];
  poiIds.forEach(function(id) {
    var poi = POIS.find(function(p) { return p.id === id; });
    if (poi) {
      var w = gcj2wgs(poi.pos[0], poi.pos[1]);
      points.push([w[1], w[0]]);
      validPois.push(poi);
    }
  });
  if (points.length < 2) return;

  _routePolyline = L.polyline(points, {
    color: color || '#27AE60',
    weight: 5,
    opacity: 0.88,
    lineJoin: 'round',
    lineCap: 'round',
  }).addTo(map);

  validPois.forEach(function(poi, idx) {
    var w = gcj2wgs(poi.pos[0], poi.pos[1]);
    var num = idx + 1;
    var icon = L.divIcon({
      html: '<div style="width:22px;height:22px;border-radius:50%;background:' + (color||'#27AE60') + ';color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);line-height:22px;text-align:center">' + num + '</div>',
      className: '',
      iconSize: [22, 22],
      iconAnchor: [11, 11],
    });
    var m = L.marker([w[1], w[0]], { icon: icon, zIndexOffset: 600 });
    m.addTo(map);
    _routeStopMarkers.push(m);
  });

  map.fitBounds(_routePolyline.getBounds(), { padding: [60, 60] });
};

window.clearRoute = function() {
  if (_routePolyline) { _routePolyline.remove(); _routePolyline = null; }
  _routeStopMarkers.forEach(function(m) { m.remove(); });
  _routeStopMarkers = [];
};

window.selectPoi = function(id) {
  if (id === null) {
    activeMarkerId = null;
    Object.keys(leafletMarkers).forEach(function(pid) {
      var poi = POIS.find(function(p){ return p.id === pid; });
      if (!poi) return;
      leafletMarkers[pid].setIcon(L.divIcon({
        html: buildMarkerHtml(poi, false),
        className: '',
        iconSize: null,
        iconAnchor: [30, 54],
      }));
    });
  } else {
    setActiveMarker(id);
  }
};

/* 吐峪沟景区大致边界 (GCJ-02) → WGS-84 */
var BOUNDARY_GCJ = [
  [89.5945, 42.8650],
  [89.5975, 42.8660],
  [89.6020, 42.8658],
  [89.6065, 42.8652],
  [89.6100, 42.8640],
  [89.6110, 42.8620],
  [89.6095, 42.8595],
  [89.6080, 42.8568],
  [89.6055, 42.8548],
  [89.6020, 42.8543],
  [89.5985, 42.8550],
  [89.5958, 42.8568],
  [89.5942, 42.8595],
  [89.5940, 42.8620],
  [89.5945, 42.8650],
];
var BOUNDARY_WGS = BOUNDARY_GCJ.map(function(c) {
  var w = gcj2wgs(c[0], c[1]);
  return [w[1], w[0]];
});

/* 初始化地图 */
map = L.map('map', {
  zoomControl: false,
  attributionControl: true,
});

L.tileLayer('/api/tiles/{z}/{x}/{y}', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

/* 景区范围半透明覆盖层 */
L.polygon(BOUNDARY_WGS, {
  color: '#E88A2E',
  weight: 2,
  opacity: 0.7,
  fillColor: '#F5A623',
  fillOpacity: 0.08,
  dashArray: '6 4',
}).addTo(map);

/* 自动缩放至所有 POI 范围 */
var allWgsPoints = POIS.map(function(p) {
  var w = gcj2wgs(p.pos[0], p.pos[1]);
  return [w[1], w[0]];
});
var bounds = L.latLngBounds(allWgsPoints);

/* 注册 load 事件必须在 fitBounds 之前，否则事件已触发无法捕获 */
map.once('load', function() {
  sendToApp({ type:"ready" });
});

map.fitBounds(bounds, { padding: [40, 40] });

map.on('click', function() {
  sendToApp({ type:"mapClick" });
});

renderMarkers();

/* 进入地图即显示当前位置（景区入口大门，GCJ-02） */
window.setMyLocation(89.5971, 42.8603);

/* 兜底：2秒后再次通知 React Native，确保 mapReady 被触发 */
setTimeout(function() { sendToApp({ type:"ready" }); }, 2000);
</script>
</body>
</html>
